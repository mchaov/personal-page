    <script>
  (function(){try{var p=window.__perf={lcp:[],cls:[],inp:[],lt:[],err:0,rej:0};
  function o(t,c,x){try{var k=Object.assign({type:t},x);if(t!=='longtask')k.buffered=true;
  new PerformanceObserver(function(l){l.getEntries().forEach(c)}).observe(k)}catch(e){}}
  o('largest-contentful-paint',function(e){p.lcp.push(e)});
  o('layout-shift',function(e){if(!e.hadRecentInput)p.cls.push(e)});
  o('event',function(e){if(e.interactionId)p.inp.push(e)},{durationThreshold:16});
  o('longtask',function(e){p.lt.push(e)});
  addEventListener('error',function(){p.err++});
  addEventListener('unhandledrejection',function(){p.rej++});
  }catch(e){}})();
  </script>
